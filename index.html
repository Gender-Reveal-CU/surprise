<!-- ===================== index.html ===================== -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mission: Pop Them All 🎈</title>
<style>
body{margin:0;overflow:hidden;font-family:sans-serif;background:black;color:white}
h1{position:absolute;top:10px;width:100%;text-align:center}
.balloon{width:80px;height:100px;border-radius:50%;position:absolute;cursor:pointer;animation:float 5s infinite ease-in-out}
@keyframes float{50%{transform:translateY(-40px)}}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:flex;justify-content:center;align-items:center;font-size:30px;z-index:10}
</style>
</head>
<body>
<div id="overlay">🎯 Pop ALL balloons to unlock reveal...</div>
<h1>Stage 1</h1>
<script>
let colors=['#ff4d6d','#ff85a1','#f72585','#ff006e'];
let total=15,count=0;
let pop=new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3');

setTimeout(()=>document.getElementById('overlay').style.display='none',2000);

for(let i=0;i<total;i++){
 let b=document.createElement('div');
 b.className='balloon';
 b.style.background=colors[Math.floor(Math.random()*colors.length)];
 b.style.left=Math.random()*95+'vw';
 b.style.top=Math.random()*90+'vh';
 b.onclick=()=>{
  pop.currentTime=0; pop.play();
  b.remove(); count++;
  if(count===total){
    document.body.innerHTML='<h1 style="margin-top:40vh">😏 Nice try... WRONG REVEAL!</h1><div style="text-align:center"><button onclick="location.href=\'page2.html\'">Next Stage →</button></div>';
  }
 }
 document.body.appendChild(b);
}
</script>
</body>
</html>
