<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>THE REVEAL 🎉</title>
<style>
  :root{
    --blue:#7dd3ff;
    --blue2:#2ea8ff;
    --white:#ffffff;
    --bg:#04030b;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    overflow:hidden;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    color:var(--white);
    background:
      radial-gradient(circle at center, #11335d 0%, #09111f 35%, var(--bg) 100%);
    min-height:100vh;
  }
  canvas{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
  }
  .overlay{
    position:relative;
    z-index:3;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    text-align:center;
  }
  .revealCard{
    width:min(92vw,820px);
    background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
    border:1px solid rgba(255,255,255,.16);
    border-radius:32px;
    box-shadow:0 24px 80px rgba(0,0,0,.45);
    backdrop-filter:blur(10px);
    padding:28px 20px 30px;
  }
  .badge{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:10px 16px;
    border-radius:999px;
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.12);
    margin-bottom:16px;
    color:#eaf7ff;
    font-weight:700;
  }
  h1{
    margin:6px 0 10px;
    font-size:clamp(2.4rem,7vw,5.4rem);
    line-height:1;
    letter-spacing:1px;
    text-shadow:0 0 24px rgba(125,211,255,.5);
    opacity:0;
    transform:translateY(18px) scale(.96);
    transition:all 1s ease;
  }
  .show{
    opacity:1 !important;
    transform:translateY(0) scale(1) !important;
  }
  .sub{
    margin:0 auto;
    max-width:760px;
    font-size:clamp(1rem,2.2vw,1.3rem);
    color:#e8f4ff;
    opacity:.95;
    line-height:1.5;
  }
  .heart{
    width:88px;
    height:88px;
    margin:22px auto 18px;
    position:relative;
    transform:rotate(-45deg);
    background:linear-gradient(135deg, #b7ecff, #2ea8ff);
    box-shadow:0 0 40px rgba(46,168,255,.45);
    animation:pulse 1.2s ease-in-out infinite;
    opacity:0;
    transition:opacity 1s ease;
  }
  .heart::before,
  .heart::after{
    content:"";
    position:absolute;
    width:88px;
    height:88px;
    border-radius:50%;
    background:inherit;
  }
  .heart::before{top:-44px; left:0}
  .heart::after{left:44px; top:0}
  @keyframes pulse{
    0%,100%{transform:rotate(-45deg) scale(1)}
    50%{transform:rotate(-45deg) scale(1.12)}
  }
  .btnRow{
    margin-top:18px;
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
  }
  button{
    appearance:none;
    border:none;
    border-radius:999px;
    padding:14px 24px;
    font-size:1rem;
    font-weight:800;
    cursor:pointer;
    color:#06101a;
    background:linear-gradient(135deg, #ebfbff, #7dd3ff);
    box-shadow:0 14px 30px rgba(125,211,255,.26);
    transition:transform .2s ease;
  }
  button:hover{transform:translateY(-2px)}
  .small{
    margin-top:14px;
    font-size:.95rem;
    color:#d5eefc;
    opacity:.8;
  }
  .confetti{
    position:absolute;
    width:10px;
    height:18px;
    top:-20px;
    border-radius:4px;
    animation:fall linear infinite;
    opacity:.95;
  }
  @keyframes fall{
    to{
      transform:translateY(120vh) rotate(720deg);
      opacity:1;
    }
  }
  .caption{
    margin-top:10px;
    color:#d7ecff;
    font-weight:600;
    letter-spacing:.3px;
  }
</style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="overlay">
    <div class="revealCard">
      <div class="badge">✨ Final Reveal</div>
      
      <h1 id="text">💙 IT'S a Kanha!!! 💙</h1>
      <div class="heart" id="heart"></div>
      <p class="sub">The wait is over. The suspense, the balloons, the fake-out gift — all of it leads here.</p>
      <div class="btnRow">
        <button id="replayBtn">Replay Music</button>
      </div>
      <div class="caption">Fireworks, confetti, and a bright blue celebration.</div>
      <div class="small">Tip: you can change the reveal message to match your announcement.</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const text = document.getElementById('text');
    const heart = document.getElementById('heart');
    const replayBtn = document.getElementById('replayBtn');

    let audioCtx;
    let celebrationTimer = null;
    let fireworks = [];
    let confettiPieces = [];

    function resize(){
      canvas.width = innerWidth;
      canvas.height = innerHeight;
    }
    addEventListener('resize', resize);
    resize();

    function initAudio(){
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function note(freq, start, dur, type = 'triangle', gain = 0.04){
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime + start);
      g.gain.setValueAtTime(0.0001, audioCtx.currentTime + start);
      g.gain.exponentialRampToValueAtTime(gain, audioCtx.currentTime + start + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + start + dur);
      osc.connect(g).connect(audioCtx.destination);
      osc.start(audioCtx.currentTime + start);
      osc.stop(audioCtx.currentTime + start + dur + 0.03);
    }

    function startCelebrationMusic(){
      stopCelebrationMusic();
      let step = 0;
      const melody = [523.25, 659.25, 783.99, 1046.5, 783.99, 659.25];
      celebrationTimer = setInterval(() => {
        const f = melody[step % melody.length];
        note(f, 0, 0.14, 'triangle', 0.04);
        note(f / 2, 0.02, 0.09, 'sine', 0.016);
        if (step % 4 === 0) note(130.81, 0, 0.08, 'square', 0.018);
        step++;
      }, 180);
    }

    function stopCelebrationMusic(){
      if (celebrationTimer) clearInterval(celebrationTimer);
      celebrationTimer = null;
    }

    function createConfetti(){
      const colors = ['#7dd3ff', '#ffffff', '#c8f3ff', '#2ea8ff'];
      for(let i = 0; i < 140; i++){
        const piece = document.createElement('div');
        piece.className = 'confetti';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (3 + Math.random() * 3) + 's';
        piece.style.animationDelay = (-Math.random() * 4) + 's';
        piece.style.width = (6 + Math.random() * 8) + 'px';
        piece.style.height = (10 + Math.random() * 14) + 'px';
        document.body.appendChild(piece);
        confettiPieces.push(piece);
      }
    }

    function createFirework(){
      return {
        x: Math.random() * canvas.width,
        y: canvas.height + 20,
        vx: (Math.random() - 0.5) * 1.2,
        vy: -6 - Math.random() * 5,
        targetY: canvas.height * (0.18 + Math.random() * 0.28),
        color: `hsl(${190 + Math.random() * 40}, 100%, 65%)`,
        exploded: false,
        particles: []
      };
    }

    function explode(f){
      note(880, 0, 0.06, 'triangle', 0.015);
      note(1174.66, 0.04, 0.08, 'triangle', 0.012);
      for(let i = 0; i < 56; i++){
        const a = Math.random() * Math.PI * 2;
        const s = 1.5 + Math.random() * 4.5;
        f.particles.push({
          x:f.x, y:f.y,
          vx:Math.cos(a) * s,
          vy:Math.sin(a) * s,
          life:50 + Math.random() * 20
        });
      }
    }

    function draw(){
      ctx.fillStyle = 'rgba(2, 4, 10, 0.18)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (Math.random() < 0.06) fireworks.push(createFirework());

      fireworks.forEach((f) => {
        if (!f.exploded){
          f.x += f.vx;
          f.y += f.vy;
          ctx.fillStyle = f.color;
          ctx.fillRect(f.x, f.y, 3, 12);
          if (f.y <= f.targetY){
            f.exploded = true;
            explode(f);
          }
        } else {
          f.particles.forEach((p) => {
            ctx.fillStyle = f.color;
            ctx.fillRect(p.x, p.y, 3, 3);
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.03;
            p.life--;
          });
          f.particles = f.particles.filter(p => p.life > 0);
        }
      });

      fireworks = fireworks.filter(f => !f.exploded || f.particles.length > 0);
      requestAnimationFrame(draw);
    }

    function startReveal(){
      initAudio();
      startCelebrationMusic();
      setTimeout(() => {
        text.classList.add('show');
        heart.style.opacity = 1;
        note(659.25, 0, 0.1, 'triangle', 0.03);
        note(783.99, 0.15, 0.12, 'triangle', 0.03);
        note(1046.5, 0.30, 0.16, 'triangle', 0.03);
      }, 1200);
    }

    function replay(){
      initAudio();
      startCelebrationMusic();
      note(523.25, 0, 0.1, 'triangle', 0.03);
      note(783.99, 0.18, 0.12, 'triangle', 0.03);
      note(1046.5, 0.34, 0.16, 'triangle', 0.03);
    }

    replayBtn.addEventListener('click', replay);
    document.addEventListener('click', () => initAudio(), { once:true });

    createConfetti();
    startReveal();
    draw();
  </script>

  <script>
  if (sessionStorage.getItem('revealReady') === '1') {
    startReveal();
  } else {
    startReveal();
  }
</script>

</body>
</html>
